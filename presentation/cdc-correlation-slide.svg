<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500" width="900" height="500">
  <!-- Background -->
  <rect width="900" height="500" fill="#0e1117"/>

  <!-- Top label -->
  <text x="450" y="52" text-anchor="middle" font-family="sans-serif" font-size="15" fill="#888" letter-spacing="2">KEY FINDING — TEMPORAL CORRELATION</text>

  <!-- Divider -->
  <line x1="80" y1="68" x2="820" y2="68" stroke="#333" stroke-width="1"/>

  <!-- Main finding -->
  <text x="450" y="155" text-anchor="middle" font-family="sans-serif" font-size="26" fill="#e0e0e0">Opioid-related posts spiked</text>
  <text x="450" y="197" text-anchor="middle" font-family="sans-serif" font-size="26" fill="#e0e0e0">
    <tspan font-size="38" font-weight="bold" fill="#ff6b6b">3 weeks</tspan>
    <tspan font-size="26" fill="#e0e0e0" dx="8"> before CDC overdose deaths rose</tspan>
  </text>

  <!-- Stats row -->
  <rect x="200" y="240" width="210" height="90" rx="8" fill="#1a1f2e" stroke="#ff6b6b" stroke-width="1.5"/>
  <text x="305" y="275" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#888">PEARSON r (lag −3 weeks)</text>
  <text x="305" y="315" text-anchor="middle" font-family="sans-serif" font-size="36" font-weight="bold" fill="#ff6b6b">0.471</text>

  <rect x="490" y="240" width="210" height="90" rx="8" fill="#1a1f2e" stroke="#ff6b6b" stroke-width="1.5"/>
  <text x="595" y="275" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#888">p-value</text>
  <text x="595" y="315" text-anchor="middle" font-family="sans-serif" font-size="36" font-weight="bold" fill="#ff6b6b">0.006</text>

  <!-- Divider -->
  <line x1="80" y1="365" x2="820" y2="365" stroke="#333" stroke-width="1"/>

  <!-- Spillover note -->
  <text x="450" y="400" text-anchor="middle" font-family="sans-serif" font-size="16" fill="#aaa">Spillover pattern: opioid language appearing in stimulant posts</text>
  <text x="450" y="428" text-anchor="middle" font-family="sans-serif" font-size="16" fill="#aaa">predicts multi-substance overdose spikes — flagged automatically</text>

  <!-- Source note -->
  <text x="450" y="478" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#555">Source: CDC Drug Overdose API × social signal cross-correlation · data/processed/correlations.json</text>
</svg>
